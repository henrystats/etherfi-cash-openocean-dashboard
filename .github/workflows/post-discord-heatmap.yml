name: Post Discord OpenOcean heatmap

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Refresh OpenOcean quote snapshots"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: openocean-discord-heatmap
  cancel-in-progress: false

jobs:
  post-heatmap:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chrome for Kaleido
        run: python -c "import plotly.io as pio; pio.get_chrome()"

      - name: Generate and post heatmap
        run: |
          python scripts/post_discord_heatmap.py \
            --basis 24h-median \
            --pair-scope usdc \
            --post-discord

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openocean-discord-heatmap
          path: data/report_snapshots/
          if-no-files-found: ignore
          retention-days: 30
