name: Post Discord OpenOcean heatmap

on:
  workflow_dispatch:
    inputs:
      basis:
        description: "Quote basis to render"
        required: true
        default: "24h-median"
        type: choice
        options:
          - "24h-median"
          - "latest"
      pair_scope:
        description: "Pairs to include"
        required: true
        default: "usdc"
        type: choice
        options:
          - "usdc"
          - "all"
  workflow_run:
    workflows: ["Refresh OpenOcean quote snapshots"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: openocean-discord-heatmap
  cancel-in-progress: false

jobs:
  post-heatmap:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      REPORT_BASIS: ${{ github.event.inputs.basis || '24h-median' }}
      REPORT_PAIR_SCOPE: ${{ github.event.inputs.pair_scope || 'usdc' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chrome for Kaleido
        run: python -c "import plotly.io as pio; pio.get_chrome()"

      - name: Generate and post heatmap
        run: |
          python scripts/post_discord_heatmap.py \
            --basis "$REPORT_BASIS" \
            --pair-scope "$REPORT_PAIR_SCOPE" \
            --post-discord

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openocean-discord-heatmap
          path: data/report_snapshots/
          if-no-files-found: ignore
          retention-days: 30
